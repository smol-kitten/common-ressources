# Alacritty color themes — generated from colors/terminal/themes.json
# To use: copy the desired [[colors]] block into your alacritty.toml,
# or import the whole file with:  import = ["/path/to/alacritty.toml"]
# then override with:  [colors] (Alacritty applies imports in order)
#
# Each theme is a standalone [[colors]] entry. Alacritty uses the last
# matching import, so put your preferred theme last.

# ─── Dracula ──────────────────────────────────────────────────────────────────
[colors.primary]
background = "#282A36"
foreground = "#F8F8F2"

[colors.cursor]
text   = "#282A36"
cursor = "#F8F8F2"

[colors.selection]
text       = "CellForeground"
background = "#44475A"

[colors.normal]
black   = "#21222C"
red     = "#FF5555"
green   = "#50FA7B"
yellow  = "#F1FA8C"
blue    = "#BD93F9"
magenta = "#FF79C6"
cyan    = "#8BE9FD"
white   = "#F8F8F2"

[colors.bright]
black   = "#6272A4"
red     = "#FF6E6E"
green   = "#69FF94"
yellow  = "#FFFFA5"
blue    = "#D6ACFF"
magenta = "#FF92DF"
cyan    = "#A4FFFF"
white   = "#FFFFFF"

