<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terminal Color Themes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f11;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Menlo, 'Consolas', monospace;
    padding: 28px;
    color: #ccc;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 22px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .card {
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 1px 2px rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .titlebar {
    display: flex;
    align-items: center;
    padding: 0 12px;
    height: 36px;
    background: rgba(0,0,0,0.35);
    border-bottom: 1px solid rgba(0,0,0,0.25);
  }
  .dots { display: flex; gap: 7px; align-items: center; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.25);
  }
  .dot-r { background: #FF5F57; }
  .dot-y { background: #FEBC2E; }
  .dot-g { background: #28C840; }
  .theme-name {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: #777;
    letter-spacing: 0.04em;
  }
  .body {
    padding: 14px 14px 12px;
  }
  .row-label {
    font-size: 9px;
    color: #444;
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .swatches {
    display: flex;
    gap: 3px;
    margin-bottom: 3px;
  }
  .swatch {
    flex: 1;
    height: 26px;
    border-radius: 3px;
    position: relative;
  }
  .swatch-name {
    position: absolute;
    bottom: 1px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 7px;
    white-space: nowrap;
    opacity: 0.7;
    pointer-events: none;
  }
  .divider { margin: 10px 0 8px; border-top: 1px solid rgba(255,255,255,0.06); }
  .prompt {
    font-size: 11px;
    line-height: 1.65;
    white-space: nowrap;
    overflow: hidden;
  }
  .prompt span { display: inline; }
</style>
</head>
<body>
<h1>Terminal Color Themes — common-ressources</h1>
<div class="grid" id="grid"></div>

<script>
const THEMES = "__THEMES__";

const KEYS = ['black','red','green','yellow','blue','magenta','cyan','white'];

function textOnBg(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 128 ? '#000' : '#fff';
}

function card(theme) {
  const c = theme.colors;
  const swatchRow = (prefix) => KEYS.map(k => {
    const hex = c[prefix + k];
    const text = textOnBg(hex);
    return `<div class="swatch" style="background:${hex}"><span class="swatch-name" style="color:${text}">${k}</span></div>`;
  }).join('');

  return `
<div class="card">
  <div class="titlebar" style="background:color-mix(in srgb, ${theme.background} 80%, black)">
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="theme-name">${theme.name}</div>
    <div style="width:44px"></div>
  </div>
  <div class="body" style="background:${theme.background}">
    <div class="row-label" style="color:${c['bright-black']}">normal</div>
    <div class="swatches">${swatchRow('')}</div>
    <div class="row-label" style="color:${c['bright-black']}">bright</div>
    <div class="swatches">${swatchRow('bright-')}</div>
    <div class="divider"></div>
    <div class="prompt">
      <span style="color:${c.green}">user@${theme.slug}:~$</span>
      <span style="color:${theme.foreground}"> echo </span>
      <span style="color:${c.yellow}">"Hello, ${theme.name}"</span>
      <br>
      <span style="color:${c.cyan}">Hello, ${theme.name}</span>
      <span style="color:${c['bright-black']}"> — bg: ${theme.background}</span>
    </div>
  </div>
</div>`;
}

document.getElementById('grid').innerHTML = THEMES.map(card).join('');
</script>
</body>
</html>
