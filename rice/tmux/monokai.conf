# Theme: Monokai
# Source: https://monokai.pro
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/monokai.conf

# Status bar
set -g status-style "bg=#272822,fg=#F8F8F2"
set -g status-left-style "fg=#A6E22E,bold"
set -g status-right-style "fg=#75715E"

# Active window tab
set -g window-status-current-style "fg=#272822,bg=#66D9E8,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#75715E,bg=#272822"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#75715E"
set -g pane-active-border-style "fg=#66D9E8"

# Message bar
set -g message-style "bg=#F4BF75,fg=#272822"

# Selection in copy mode
set -g mode-style "bg=#75715E,fg=#F8F8F2"

# Clock
set -g clock-mode-colour "#66D9E8"
