# Theme: Modus Vivendi
# Source: https://protesilaos.com/emacs/modus-themes
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/modus-vivendi.conf

# Status bar
set -g status-style "bg=#000000,fg=#FFFFFF"
set -g status-left-style "fg=#44BC44,bold"
set -g status-right-style "fg=#595959"

# Active window tab
set -g window-status-current-style "fg=#000000,bg=#2FAFFF,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#595959,bg=#000000"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#595959"
set -g pane-active-border-style "fg=#2FAFFF"

# Message bar
set -g message-style "bg=#D0BC00,fg=#000000"

# Selection in copy mode
set -g mode-style "bg=#2C2C2C,fg=#FFFFFF"

# Clock
set -g clock-mode-colour "#2FAFFF"
