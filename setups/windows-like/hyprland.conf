# ──────────────────────────────────────────────────────────────
# Hyprland config — windows-like setup (Material Dark + Win Blue)
# ──────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/wallpaper.jpg --transition-type fade
exec-once = wl-paste --watch cliphist store

$terminal   = alacritty
$launcher   = rofi -show drun -show-icons
$filemanager = thunar
$browser    = firefox

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll    = false
        disable_while_typing = true
        tap-to-click      = true
    }
}

# ── General ────────────────────────────────────────────────────
general {
    gaps_in              = 4
    gaps_out             = 8
    border_size          = 1
    col.active_border    = rgba(0078d4ff)
    col.inactive_border  = rgba(404040ff)
    layout               = dwindle
    resize_on_border     = true
}

# ── Decorations ────────────────────────────────────────────────
decoration {
    rounding = 4

    blur {
        enabled          = true
        size             = 5
        passes           = 2
        new_optimizations = true
        ignore_opacity   = false
        xray             = false
    }

    drop_shadow          = true
    shadow_range         = 8
    shadow_render_power  = 2
    shadow_offset        = 0 2
    col.shadow           = rgba(00000040)
    col.shadow_inactive  = rgba(00000020)

    active_opacity       = 1.0
    inactive_opacity     = 1.0
    fullscreen_opacity   = 1.0
}

# ── Animations — quick, Windows-like ───────────────────────────
animations {
    enabled = true

    bezier = winEase,   0.0, 0.0, 0.2, 1.0
    bezier = winOut,    0.3, 0.0, 1.0, 1.0

    animation = windows,     1, 3, winEase,  slide
    animation = windowsOut,  1, 2, winOut,   popin 90%
    animation = border,      1, 5, winEase
    animation = fade,        1, 3, winEase
    animation = workspaces,  1, 3, winEase,  slide
}

# ── Layout ─────────────────────────────────────────────────────
dwindle {
    pseudotile        = true
    preserve_split    = true
    smart_split       = false
}

master {
    new_is_master = false
}

# ── Gestures ───────────────────────────────────────────────────
gestures {
    workspace_swipe        = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert  = false
}

# ── Misc ───────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = false
    animate_mouse_windowdragging = false
    enable_swallow          = true
    swallow_regex           = ^(alacritty|kitty)$
}

# ── Window rules ───────────────────────────────────────────────
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = float,  title:^(Preferences)$
windowrulev2 = float,  title:^(Open File)$
windowrulev2 = float,  title:^(Save File)$
windowrulev2 = center, floating:1

# ── Keybinds — Windows-style (SUPER = Win key) ─────────────────
$mod = SUPER

bind = $mod, Return,     exec, $terminal
bind = $mod, Space,      exec, $launcher
bind = $mod, E,          exec, $filemanager
bind = $mod, B,          exec, $browser
# Alt+F4 close
bind = ALT, F4,          killactive
bind = $mod, Q,          killactive
bind = $mod, F,          fullscreen, 1
bind = $mod SHIFT, F,    fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo
bind = $mod SHIFT, Q,    exit

# Win+D = show desktop (go to empty workspace)
bind = $mod, D,          exec, $launcher

# Screenshot (PrtSc style)
bind = , Print,          exec, grimblast copysave screen
bind = SHIFT, Print,     exec, grimblast copysave area

# Focus
bind = $mod, left,       movefocus, l
bind = $mod, right,      movefocus, r
bind = $mod, up,         movefocus, u
bind = $mod, down,       movefocus, d

# Move windows (Win+Shift+Arrow)
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Snap windows — half-screen (Win+Arrow)
bind = $mod, left,       splitratio, -0.1
bind = $mod, right,      splitratio, 0.1

# Workspaces (Win+1-9)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume / brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
