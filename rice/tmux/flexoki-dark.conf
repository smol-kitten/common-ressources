# Theme: Flexoki Dark
# Source: https://stephango.com/flexoki
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/flexoki-dark.conf

# Status bar
set -g status-style "bg=#100F0F,fg=#CECDC3"
set -g status-left-style "fg=#879A39,bold"
set -g status-right-style "fg=#575653"

# Active window tab
set -g window-status-current-style "fg=#100F0F,bg=#4385BE,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#575653,bg=#100F0F"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#575653"
set -g pane-active-border-style "fg=#4385BE"

# Message bar
set -g message-style "bg=#D0A215,fg=#100F0F"

# Selection in copy mode
set -g mode-style "bg=#282726,fg=#CECDC3"

# Clock
set -g clock-mode-colour "#4385BE"
