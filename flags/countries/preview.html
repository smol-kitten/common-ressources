<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Country Flags</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f12;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 28px;
    color: #ccc;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
  }
  .flag-card {
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 3px 14px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .flag {
    width: 100%;
    height: 80px;
    overflow: hidden;
  }
  .flag-meta {
    background: #1a1a1f;
    padding: 7px 9px;
  }
  .flag-name {
    font-size: 11px;
    color: #ddd;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .flag-iso {
    font-size: 10px;
    color: #555;
    font-family: monospace;
    margin-top: 1px;
  }
  .flag-continent {
    font-size: 9px;
    color: #444;
    margin-top: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<h1>Country Flags (simple stripe) — common-ressources</h1>
<div class="grid"><!--__CARDS__--></div>
</body>
</html>
