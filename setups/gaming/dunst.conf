# ── gaming Dunst — Gruvbox Dark — bottom-right, won't block HUD

[global]
    monitor                 = 0
    follow                  = none

    # Bottom-right so it doesn't block game HUD
    width                   = 300
    height                  = 80
    origin                  = bottom-right
    offset                  = 12x12
    scale                   = 0

    notification_limit      = 3
    progress_bar            = true
    progress_bar_height     = 6
    progress_bar_frame_width = 1
    progress_bar_min_width  = 100
    progress_bar_max_width  = 260

    indicate_hidden         = yes
    transparency            = 0
    separator_height        = 1
    padding                 = 8
    horizontal_padding      = 10
    text_icon_padding       = 8
    frame_width             = 2
    frame_color             = "#504945"
    gap_size                = 4
    separator_color         = frame
    sort                    = yes

    font                    = JetBrainsMono Nerd Font 11
    line_height             = 1
    markup                  = full
    format                  = "<b>%s</b>\n%b"
    alignment               = left
    vertical_alignment      = center
    show_age_threshold      = -1
    ellipsize               = middle
    ignore_newline          = no
    stack_duplicates        = true
    hide_duplicate_count    = false
    show_indicators         = yes

    icon_position           = left
    min_icon_size           = 20
    max_icon_size           = 32

    sticky_history          = yes
    history_length          = 10
    corner_radius           = 3
    mouse_left_click        = close_current
    mouse_middle_click      = do_action, close_current
    mouse_right_click       = close_all

[experimental]
    per_monitor_dpi         = false

# ── Urgency: Low ───────────────────────────────────────────────
[urgency_low]
    background              = "#282828"
    foreground              = "#928374"
    frame_color             = "#504945"
    timeout                 = 2

# ── Urgency: Normal ────────────────────────────────────────────
[urgency_normal]
    background              = "#282828"
    foreground              = "#ebdbb2"
    frame_color             = "#504945"
    timeout                 = 4

# ── Urgency: Critical ──────────────────────────────────────────
[urgency_critical]
    background              = "#282828"
    foreground              = "#cc241d"
    frame_color             = "#cc241d"
    timeout                 = 0
