# Theme: Catppuccin Mocha
# Source: https://github.com/catppuccin/catppuccin
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/catppuccin-mocha.conf

# Status bar
set -g status-style "bg=#1E1E2E,fg=#CDD6F4"
set -g status-left-style "fg=#A6E3A1,bold"
set -g status-right-style "fg=#585B70"

# Active window tab
set -g window-status-current-style "fg=#1E1E2E,bg=#89B4FA,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#585B70,bg=#1E1E2E"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#585B70"
set -g pane-active-border-style "fg=#89B4FA"

# Message bar
set -g message-style "bg=#F9E2AF,fg=#1E1E2E"

# Selection in copy mode
set -g mode-style "bg=#585B70,fg=#CDD6F4"

# Clock
set -g clock-mode-colour "#89B4FA"
