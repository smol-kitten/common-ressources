# ── programming tmux config — Tokyo Night ─────────────────────
# Install: ~/.config/tmux/tmux.conf  (or ~/.tmux.conf)
# tmux-resurrect: https://github.com/tmux-plugins/tmux-resurrect
#   install: git clone https://github.com/tmux-plugins/tmux-resurrect ~/.tmux/plugins/tmux-resurrect
#   save: prefix + Ctrl+s  |  restore: prefix + Ctrl+r

# ── Prefix: Ctrl+Space (nvim-friendly, avoids conflicts) ──────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits ─────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Alt+hjkl pane navigation (no prefix needed) ───────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes (prefix + HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Vim copy mode ──────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Status bar — Tokyo Night style ────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style "bg=colour234,fg=colour189"

# Status left: session name
set -g status-left "#[fg=colour111,bold] #S #[default] "
set -g status-left-length 20

# Status right: 24h clock
set -g status-right "#[fg=colour189] %H:%M "
set -g status-right-length 15

# Window list
setw -g window-status-format         "#[fg=colour243] #I:#W "
setw -g window-status-current-format "#[fg=colour111,bold] #I:#W "
setw -g window-status-current-style  "fg=colour111,bold"

# Pane borders (bright-black and Tokyo Night blue)
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour111"

# ── tmux-resurrect (uncomment if installed) ───────────────────
# run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
