# ── pride tmux config — Trans Pride colors ────────────────────
# Install: ~/.config/tmux/tmux.conf  (or ~/.tmux.conf)
# Trans blue: #55cdfc (colour81)  |  Trans pink: #f7a8b8 (colour218)

# ── Prefix: Ctrl+a ────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits ─────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation ────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Reload config ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded ✨"

# ── Status bar — Trans Pride rainbow segments ─────────────────
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style "bg=colour17,fg=colour255"

# Status left: trans blue session name
set -g status-left "#[fg=colour81,bold] #S #[default] "
set -g status-left-length 20

# Status right: trans pink hostname and clock
set -g status-right "#[fg=colour218] #H  %H:%M "
set -g status-right-length 35

# Window list — white for normal, trans blue for active
setw -g window-status-format         "#[fg=colour255] #I:#W "
setw -g window-status-current-format "#[fg=colour81,bold] #I:#W "
setw -g window-status-current-style  "fg=colour81,bold"

# Pane borders — trans pink for active
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour218"

# ── Copy mode ──────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
