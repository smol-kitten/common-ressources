# Theme: Dracula
# Source: https://draculatheme.com
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/dracula.conf

# Status bar
set -g status-style "bg=#282A36,fg=#F8F8F2"
set -g status-left-style "fg=#50FA7B,bold"
set -g status-right-style "fg=#6272A4"

# Active window tab
set -g window-status-current-style "fg=#282A36,bg=#BD93F9,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#6272A4,bg=#282A36"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#6272A4"
set -g pane-active-border-style "fg=#BD93F9"

# Message bar
set -g message-style "bg=#F1FA8C,fg=#282A36"

# Selection in copy mode
set -g mode-style "bg=#44475A,fg=#F8F8F2"

# Clock
set -g clock-mode-colour "#BD93F9"
