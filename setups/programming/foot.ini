# ── programming Foot terminal config ──────────────────────────
# Install: ~/.config/foot/foot.ini

[main]
font=JetBrainsMono Nerd Font:size=11
pad=10x6
dpi-aware=yes
term=foot

[colors]
background=1a1b26
foreground=c0caf5
selection-background=414868
selection-foreground=c0caf5

regular0=15161e
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=a9b1d6
bright0=414868
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=c0caf5

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000
