# Theme: Catppuccin Frappe
# Source: https://github.com/catppuccin/catppuccin
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/catppuccin-frappe.conf

# Status bar
set -g status-style "bg=#303446,fg=#C6D0F5"
set -g status-left-style "fg=#A6D189,bold"
set -g status-right-style "fg=#626880"

# Active window tab
set -g window-status-current-style "fg=#303446,bg=#8CAAEE,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#626880,bg=#303446"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#626880"
set -g pane-active-border-style "fg=#8CAAEE"

# Message bar
set -g message-style "bg=#E5C890,fg=#303446"

# Selection in copy mode
set -g mode-style "bg=#626880,fg=#C6D0F5"

# Clock
set -g clock-mode-colour "#8CAAEE"
