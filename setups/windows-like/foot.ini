# ── windows-like Foot terminal config ─────────────────────────
# Install: ~/.config/foot/foot.ini

[main]
font=JetBrainsMono Nerd Font:size=11
pad=10x6
dpi-aware=yes
term=foot

[colors]
background=212121
foreground=eeffff
selection-background=546e7a
selection-foreground=eeffff

regular0=546e7a
regular1=ff5252
regular2=69f0ae
regular3=ffb300
regular4=0078d4
regular5=e040fb
regular6=40c4ff
regular7=b0bec5
bright0=78909c
bright1=ff5252
bright2=69f0ae
bright3=ffd740
bright4=40c4ff
bright5=ea80fc
bright6=84ffff
bright7=eeffff

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000
