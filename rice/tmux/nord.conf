# Theme: Nord
# Source: https://www.nordtheme.com
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/nord.conf

# Status bar
set -g status-style "bg=#2E3440,fg=#D8DEE9"
set -g status-left-style "fg=#A3BE8C,bold"
set -g status-right-style "fg=#4C566A"

# Active window tab
set -g window-status-current-style "fg=#2E3440,bg=#81A1C1,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#4C566A,bg=#2E3440"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#4C566A"
set -g pane-active-border-style "fg=#81A1C1"

# Message bar
set -g message-style "bg=#EBCB8B,fg=#2E3440"

# Selection in copy mode
set -g mode-style "bg=#4C566A,fg=#D8DEE9"

# Clock
set -g clock-mode-colour "#81A1C1"
