<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rice Terminal Previews</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f12;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 28px;
    color: #ccc;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .terminal-card {
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .titlebar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 12px;
    background: rgba(255,255,255,0.06);
  }
  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
  }
  .dot-red   { background: #ff5f57; }
  .dot-yel   { background: #ffbd2e; }
  .dot-grn   { background: #28c841; }
  .title-label {
    flex: 1;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.45);
    margin-right: 35px;
  }
  .term-body {
    padding: 14px 16px 16px;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 12px;
  }
  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 4px;
  }
  .prompt-line {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }
  .ps1-user  { font-weight: 700; }
  .ps1-sep   { opacity: 0.4; }
  .ps1-dir   { font-weight: 600; }
  .ps1-git   { opacity: 0.6; font-size: 11px; }
  .ps1-sym   { font-weight: 700; }
  .cmd-line  { opacity: 0.75; margin-bottom: 3px; }
  .out-line  { opacity: 0.5; font-size: 11px; }
</style>
</head>
<body>
<h1>Terminal Themes — common-ressources / rice</h1>
<div class="grid" id="grid"></div>

<script>
const THEMES = "__THEMES__";

const ANSI_KEYS = [
  'black','red','green','yellow','blue','magenta','cyan','white',
  'bright-black','bright-red','bright-green','bright-yellow',
  'bright-blue','bright-magenta','bright-cyan','bright-white',
];

function card(theme) {
  const bg = theme.background || '#1e1e2e';
  const fg = theme.foreground || '#cdd6f4';
  const accent = theme.colors['blue'] || theme.colors['cyan'] || fg;
  const green  = theme.colors['green'] || '#a6e3a1';
  const yellow = theme.colors['yellow'] || '#f9e2af';

  const swatches = ANSI_KEYS.map(k =>
    `<div class="swatch" style="background:${theme.colors[k] || '#888'}" title="${k}"></div>`
  ).join('');

  return `<div class="terminal-card">
  <div class="titlebar" style="background:${bg}cc">
    <div class="dot dot-red"></div>
    <div class="dot dot-yel"></div>
    <div class="dot dot-grn"></div>
    <div class="title-label">${theme.name}</div>
  </div>
  <div class="term-body" style="background:${bg};color:${fg}">
    <div class="swatches">${swatches}</div>
    <div class="prompt-line">
      <span class="ps1-user" style="color:${green}">user</span>
      <span class="ps1-sep">@arch</span>
      <span class="ps1-sep">:</span>
      <span class="ps1-dir" style="color:${accent}">~/dotfiles</span>
      <span class="ps1-git" style="color:${yellow}"> main</span>
      <span class="ps1-sym" style="color:${green}">$</span>
    </div>
    <div class="cmd-line" style="color:${fg}">ls -la rice/</div>
    <div class="out-line">alacritty/  dunst/  hyprland/  kitty/  rofi/  waybar/  wezterm/</div>
  </div>
</div>`;
}

document.getElementById('grid').innerHTML = THEMES.map(card).join('');
</script>
</body>
</html>
