# Theme: Ayu Light
# Source: https://github.com/dempfi/ayu
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/ayu-light.conf

# Status bar
set -g status-style "bg=#FAFAFA,fg=#575F66"
set -g status-left-style "fg=#86B300,bold"
set -g status-right-style "fg=#5C6773"

# Active window tab
set -g window-status-current-style "fg=#FAFAFA,bg=#41A6D9,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#5C6773,bg=#FAFAFA"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#5C6773"
set -g pane-active-border-style "fg=#41A6D9"

# Message bar
set -g message-style "bg=#F29718,fg=#FAFAFA"

# Selection in copy mode
set -g mode-style "bg=#D3D3D3,fg=#575F66"

# Clock
set -g clock-mode-colour "#41A6D9"
