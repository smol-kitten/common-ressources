# ── pride Dunst — Trans Pride + Rainbow ───────────────────────

[global]
    monitor                 = 0
    follow                  = mouse

    # Geometry — top-right
    width                   = 370
    height                  = 130
    origin                  = top-right
    offset                  = 14x52
    scale                   = 0

    notification_limit      = 5
    progress_bar            = true
    progress_bar_height     = 8
    progress_bar_frame_width = 1
    progress_bar_min_width  = 150
    progress_bar_max_width  = 300
    progress_bar_corner_radius = 6

    indicate_hidden         = yes
    transparency            = 5
    separator_height        = 1
    padding                 = 12
    horizontal_padding      = 14
    text_icon_padding       = 10
    frame_width             = 2
    frame_color             = "#55cdfc"
    gap_size                = 6
    separator_color         = frame
    sort                    = yes

    font                    = JetBrainsMono Nerd Font 11
    line_height             = 2
    markup                  = full
    format                  = "<b>%s</b>\n%b"
    alignment               = left
    vertical_alignment      = center
    show_age_threshold      = 60
    ellipsize               = middle
    ignore_newline          = no
    stack_duplicates        = true
    hide_duplicate_count    = false
    show_indicators         = yes

    enable_recursive_icon_lookup = true
    icon_theme              = Papirus-Dark
    icon_position           = left
    min_icon_size           = 24
    max_icon_size           = 48

    sticky_history          = yes
    history_length          = 20
    browser                 = /usr/bin/xdg-open
    always_run_script       = true
    title                   = Dunst
    class                   = Dunst
    corner_radius           = 14
    force_xwayland          = false
    verbosity               = mesg
    mouse_left_click        = close_current
    mouse_middle_click      = do_action, close_current
    mouse_right_click       = close_all

[urgency_low]
    background              = "#0d0221"
    foreground              = "#d4b8e0"
    frame_color             = "#2a1052"
    timeout                 = 5

[urgency_normal]
    background              = "#1a0a2e"
    foreground              = "#ffffff"
    frame_color             = "#55cdfc"
    timeout                 = 8

[urgency_critical]
    background              = "#1a0a2e"
    foreground              = "#ff4d4d"
    frame_color             = "#ff4d4d"
    timeout                 = 0
    default_icon            = dialog-error
