# ──────────────────────────────────────────────────────────────
# Hyprland config — programming setup (Tokyo Night)
# ──────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/wallpaper.jpg --transition-type fade
exec-once = wl-paste --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

$terminal   = alacritty
$launcher   = rofi -show drun -show-icons
$filemanager = thunar
$browser    = firefox
$editor     = alacritty -e nvim

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity = -0.2
    repeat_rate = 35
    repeat_delay = 250
    touchpad {
        natural_scroll    = true
        disable_while_typing = true
        tap-to-click      = true
        drag_lock         = true
    }
}

# ── General ────────────────────────────────────────────────────
general {
    gaps_in              = 6
    gaps_out             = 10
    border_size          = 2
    col.active_border    = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
    col.inactive_border  = rgba(292e42ff)
    layout               = dwindle
    resize_on_border     = true
}

# ── Decorations ────────────────────────────────────────────────
decoration {
    rounding = 8

    blur {
        enabled          = true
        size             = 6
        passes           = 2
        new_optimizations = true
        ignore_opacity   = false
        xray             = false
    }

    drop_shadow          = true
    shadow_range         = 16
    shadow_render_power  = 3
    shadow_offset        = 0 4
    col.shadow           = rgba(1a1b2680)
    col.shadow_inactive  = rgba(1a1b2640)

    active_opacity       = 1.0
    inactive_opacity     = 0.95
    fullscreen_opacity   = 1.0
}

# ── Animations — snappy but smooth ─────────────────────────────
animations {
    enabled = true

    bezier = snap,   0.16, 1.0, 0.3, 1.0
    bezier = linear, 0.0,  0.0, 1.0, 1.0

    animation = windows,     1, 4,  snap,   slide
    animation = windowsOut,  1, 3,  snap,   popin 85%
    animation = border,      1, 6,  linear
    animation = fade,        1, 4,  snap
    animation = workspaces,  1, 4,  snap,   slidefade 15%
}

# ── Layout ─────────────────────────────────────────────────────
dwindle {
    pseudotile        = true
    preserve_split    = true
    smart_split       = true
    no_gaps_when_only = 1
}

master {
    new_is_master = false
    no_gaps_when_only = 1
}

# ── Gestures ───────────────────────────────────────────────────
gestures {
    workspace_swipe        = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 250
    workspace_swipe_invert  = true
    workspace_swipe_cancel_ratio = 0.15
}

# ── Misc ───────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = true
    animate_mouse_windowdragging = true
    enable_swallow          = true
    swallow_regex           = ^(alacritty|kitty|foot)$
    focus_on_activate       = true
}

# ── Window rules ───────────────────────────────────────────────
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = float,  title:^(Preferences)$
windowrulev2 = float,  title:^(Open File)$
windowrulev2 = float,  title:^(Save File)$
windowrulev2 = float,  title:^(lazygit)$
windowrulev2 = size 1200 700, title:^(lazygit)$
windowrulev2 = center, floating:1
# Keep terminal transparent
windowrulev2 = opacity 0.94 0.90, class:^(alacritty)$

# ── Keybinds ───────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,     exec, $terminal
bind = $mod, Space,      exec, $launcher
bind = $mod, E,          exec, $filemanager
bind = $mod, B,          exec, $browser
bind = $mod, N,          exec, $editor
bind = $mod, Q,          killactive
bind = $mod, F,          fullscreen, 1
bind = $mod SHIFT, F,    fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo
bind = $mod, J,          togglesplit
bind = $mod SHIFT, Q,    exit
bind = $mod, M,          exec, alacritty -e btop
bind = $mod, G,          exec, alacritty -e lazygit

# Screenshots
bind = $mod SHIFT, 3,    exec, grimblast copysave screen
bind = $mod SHIFT, 4,    exec, grimblast copysave area

# Focus (vim-style)
bind = $mod, h,          movefocus, l
bind = $mod, l,          movefocus, r
bind = $mod, k,          movefocus, u
bind = $mod, j,          movefocus, d
bind = $mod, left,       movefocus, l
bind = $mod, right,      movefocus, r
bind = $mod, up,         movefocus, u
bind = $mod, down,       movefocus, d

# Move windows
bind = $mod SHIFT, h,    movewindow, l
bind = $mod SHIFT, l,    movewindow, r
bind = $mod SHIFT, k,    movewindow, u
bind = $mod SHIFT, j,    movewindow, d

# Resize
binde = $mod ALT, h,     resizeactive, -40 0
binde = $mod ALT, l,     resizeactive, 40  0
binde = $mod ALT, k,     resizeactive, 0  -40
binde = $mod ALT, j,     resizeactive, 0   40

# Workspaces 1-9
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scratchpad
bind = $mod, grave,       togglespecialworkspace, scratch
bind = $mod SHIFT, grave, movetoworkspace, special:scratch

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume / brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
