# Regenerates all PNG preview images and commits them back to the branch.
# Runs on every push to main when JSON data or HTML templates change.
# Uses the Playwright Docker image so no local browser install is needed.

name: Generate Previews

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.json'
      - '**/*.html'
      - 'tests/generate-previews.js'
      - 'tests/previews.spec.js'
      - 'package.json'
      - 'docker/Dockerfile'
  workflow_dispatch:

jobs:
  generate:
    runs-on: self-hosted
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy
      options: --user root

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Node dependencies
        run: npm ci

      - name: Run Playwright tests (includes screenshot generation)
        run: npx playwright test --reporter=list
        env:
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

      - name: Show generated previews
        run: |
          echo "Generated PNG files:"
          find . -name "*.png" ! -path "./.git/*" | sort

      - name: Commit generated previews
        run: |
          git config user.email "noreply@github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add $(find . -name "*.png" ! -path "./.git/*" | head -50)
          if git diff --staged --quiet; then
            echo "No preview changes to commit."
          else
            git commit -m "chore: regenerate preview images [skip ci]"
            git push origin HEAD
          fi
