<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Country Flags</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f12;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 28px;
    color: #ccc;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
  }
  .flag-card {
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 3px 14px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .flag {
    width: 100%;
    height: 80px;
    overflow: hidden;
  }
  .flag-meta {
    background: #1a1a1f;
    padding: 7px 9px;
  }
  .flag-name {
    font-size: 11px;
    color: #ddd;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .flag-iso {
    font-size: 10px;
    color: #555;
    font-family: monospace;
    margin-top: 1px;
  }
  .flag-continent {
    font-size: 9px;
    color: #444;
    margin-top: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<h1>Country Flags (simple stripe) — common-ressources</h1>
<div class="grid" id="grid"></div>

<script>
const FLAGS = "__FLAGS__";

function card(flag) {
  const isVertical = flag.type === 'vertical-stripes';
  const direction = isVertical ? 'row' : 'column';
  const stripes = flag.colors.map(c => `<div style="background:${c};flex:1"></div>`).join('');
  return `<div class="flag-card">
    <div class="flag"><div style="display:flex;flex-direction:${direction};height:80px;width:100%">${stripes}</div></div>
    <div class="flag-meta">
      <div class="flag-name">${flag.name}</div>
      <div class="flag-iso">${flag.iso}</div>
      <div class="flag-continent">${flag.continent}</div>
    </div>
  </div>`;
}

document.getElementById('grid').innerHTML = FLAGS.map(card).join('');
</script>
</body>
</html>
