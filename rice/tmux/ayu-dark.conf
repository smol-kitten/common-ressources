# Theme: Ayu Dark
# Source: https://github.com/dempfi/ayu
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/ayu-dark.conf

# Status bar
set -g status-style "bg=#0a0e14,fg=#b3b1ad"
set -g status-left-style "fg=#91b362,bold"
set -g status-right-style "fg=#686868"

# Active window tab
set -g window-status-current-style "fg=#0a0e14,bg=#53bdfa,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#686868,bg=#0a0e14"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#686868"
set -g pane-active-border-style "fg=#53bdfa"

# Message bar
set -g message-style "bg=#f9af4f,fg=#0a0e14"

# Selection in copy mode
set -g mode-style "bg=#273747,fg=#b3b1ad"

# Clock
set -g clock-mode-colour "#53bdfa"
