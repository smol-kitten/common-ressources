# ── mac-like tmux config — Catppuccin Latte ───────────────────
# Install: ~/.config/tmux/tmux.conf  (or ~/.tmux.conf)

# ── Prefix: Ctrl+a (macOS muscle memory, like GNU Screen) ─────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits with | and - ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Vim key bindings for pane navigation (prefix + hjkl) ──────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar — Catppuccin Latte style ───────────────────────
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style "bg=colour255,fg=colour240"

# Status left: session name with Apple icon
set -g status-left "#[fg=colour26,bold]  #S #[default] "
set -g status-left-length 20

# Status right: hostname, 12h clock
set -g status-right "#[fg=colour240] #H  %I:%M %p "
set -g status-right-length 40

# Window list
setw -g window-status-format         "#[fg=colour248] #I:#W "
setw -g window-status-current-format "#[fg=colour26,bold] #I:#W "
setw -g window-status-current-style  "fg=colour26,bold"

# Pane borders
set -g pane-border-style        "fg=colour253"
set -g pane-active-border-style "fg=colour26"

# ── Copy mode ──────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
