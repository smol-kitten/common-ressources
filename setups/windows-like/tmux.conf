# ── windows-like tmux config — Material Dark ──────────────────
# Install: ~/.config/tmux/tmux.conf  (or ~/.tmux.conf)

# ── Prefix: Ctrl+b (default, familiar to Windows Terminal users)
# Ctrl+b is kept as-is — no rebind needed

# ── General ────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits — Windows Terminal style ───────────────────────────
# Alt+\ to split vertical, Alt+- to split horizontal
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
# Also keep standard splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (arrow keys) ──────────────────────────────
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# ── Reload config ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar — Material Dark style ──────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour234,fg=colour252"

# Status left: session name
set -g status-left "#[fg=colour33,bold] #S #[default] "
set -g status-left-length 20

# Status right: 24h clock, date (Windows style DD/MM/YYYY)
set -g status-right "#[fg=colour252] %H:%M  %d/%m/%Y "
set -g status-right-length 30

# Window list
setw -g window-status-format         "#[fg=colour245] #I:#W "
setw -g window-status-current-format "#[fg=colour33,bold] #I:#W "
setw -g window-status-current-style  "fg=colour33,bold"

# Pane borders
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour33"

# ── Copy mode ──────────────────────────────────────────────────
setw -g mode-keys emacs
