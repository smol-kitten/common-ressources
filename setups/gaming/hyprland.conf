# ──────────────────────────────────────────────────────────────
# Hyprland config — gaming setup (Gruvbox Dark)
# Performance-first: no blur, no shadows, minimal animations
# ──────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/wallpaper.jpg --transition-type fade
# exec-once = gamemoded          # uncomment if using gamemode daemon

$terminal   = alacritty
$launcher   = rofi -show drun -show-icons
$filemanager = thunar
$browser    = firefox

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll    = false
        disable_while_typing = true
        tap-to-click      = true
    }
}

# ── General ────────────────────────────────────────────────────
general {
    gaps_in              = 2
    gaps_out             = 4
    border_size          = 2
    col.active_border    = rgba(fe8019ff)
    col.inactive_border  = rgba(504945ff)
    layout               = master
    resize_on_border     = true
}

# ── Decorations ────────────────────────────────────────────────
decoration {
    rounding = 4

    blur {
        enabled = false
    }

    drop_shadow = false

    active_opacity   = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
}

# ── Animations (disabled for performance) ──────────────────────
animations {
    enabled = false
}

# ── Layout ─────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_is_master  = false
    mfact          = 0.55
}

# ── Gestures ───────────────────────────────────────────────────
gestures {
    workspace_swipe = false
}

# ── Misc ───────────────────────────────────────────────────────
misc {
    force_default_wallpaper       = 0
    disable_hyprland_logo         = true
    animate_manual_resizes        = false
    animate_mouse_windowdragging  = false
    enable_swallow                = false
}

# ── Window rules — float gaming apps ───────────────────────────
windowrulev2 = float, class:^(steam)$
windowrulev2 = float, class:^(gamescope)$
windowrulev2 = float, class:^(discord)$
windowrulev2 = float, class:^(com.obsproject.Studio)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Preferences)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = center, floating:1

# Workspace 5 dedicated for games
windowrulev2 = workspace 5, class:^(steam_app_.*)$
windowrulev2 = workspace 5, class:^(gamescope)$

# ── Keybinds ───────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,     exec, $terminal
bind = $mod, Space,      exec, $launcher
bind = $mod, E,          exec, $filemanager
bind = $mod, B,          exec, $browser
bind = $mod, Q,          killactive
bind = $mod, F,          fullscreen, 1
bind = $mod SHIFT, F,    fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo
bind = $mod SHIFT, Q,    exit

# Screenshot
bind = $mod SHIFT, 3, exec, grimblast copysave screen
bind = $mod SHIFT, 4, exec, grimblast copysave area

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, h,     movefocus, l
bind = $mod, l,     movefocus, r
bind = $mod, k,     movefocus, u
bind = $mod, j,     movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces (1-5, workspace 5 = games)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume / brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
