# ── mac-like Dunst — Catppuccin Latte ─────────────────────────

[global]
    monitor                 = 0
    follow                  = mouse

    # Geometry — top-right, macOS Notification Center style
    width                   = 360
    height                  = 120
    origin                  = top-right
    offset                  = 16x52
    scale                   = 0

    notification_limit      = 5
    progress_bar            = true
    progress_bar_height     = 8
    progress_bar_frame_width = 1
    progress_bar_min_width  = 150
    progress_bar_max_width  = 300
    progress_bar_corner_radius = 4

    indicate_hidden         = yes
    transparency            = 6
    separator_height        = 1
    padding                 = 12
    horizontal_padding      = 14
    text_icon_padding       = 10
    frame_width             = 1
    frame_color             = "#bcc0cc"
    gap_size                = 6
    separator_color         = frame
    sort                    = yes
    idle_threshold          = 120

    # Typography
    font                    = JetBrainsMono Nerd Font 11
    line_height             = 2
    markup                  = full
    format                  = "<b>%s</b>\n%b"
    alignment               = left
    vertical_alignment      = center
    show_age_threshold      = 60
    ellipsize               = middle
    ignore_newline          = no
    stack_duplicates        = true
    hide_duplicate_count    = false
    show_indicators         = yes

    # Icons
    enable_recursive_icon_lookup = true
    icon_theme              = Papirus-Light
    icon_position           = left
    min_icon_size           = 24
    max_icon_size           = 48

    # Window
    sticky_history          = yes
    history_length          = 20
    browser                 = /usr/bin/xdg-open
    always_run_script       = true
    title                   = Dunst
    class                   = Dunst
    corner_radius           = 12
    ignore_dbusclose        = false
    force_xwayland          = false
    force_xinerama          = false
    verbosity               = mesg
    mouse_left_click        = close_current
    mouse_middle_click      = do_action, close_current
    mouse_right_click       = close_all

[experimental]
    per_monitor_dpi         = false

# ── Urgency: Low ───────────────────────────────────────────────
[urgency_low]
    background              = "#eff1f5"
    foreground              = "#6c6f85"
    frame_color             = "#bcc0cc"
    timeout                 = 5
    default_icon            = dialog-information

# ── Urgency: Normal ────────────────────────────────────────────
[urgency_normal]
    background              = "#eff1f5"
    foreground              = "#4c4f69"
    frame_color             = "#bcc0cc"
    timeout                 = 8
    default_icon            = dialog-information

# ── Urgency: Critical ──────────────────────────────────────────
[urgency_critical]
    background              = "#eff1f5"
    foreground              = "#d20f39"
    frame_color             = "#d20f39"
    timeout                 = 0
    default_icon            = dialog-error
