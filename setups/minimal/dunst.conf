# ── minimal Dunst — Monochrome Grayscale ───────────────────────

[global]
    monitor                 = 0
    follow                  = mouse

    width                   = 280
    height                  = 80
    origin                  = top-right
    offset                  = 8x8
    scale                   = 0

    notification_limit      = 3
    progress_bar            = true
    progress_bar_height     = 4
    progress_bar_frame_width = 1
    progress_bar_min_width  = 100
    progress_bar_max_width  = 240

    indicate_hidden         = yes
    transparency            = 0
    separator_height        = 1
    padding                 = 8
    horizontal_padding      = 10
    text_icon_padding       = 0
    frame_width             = 1
    frame_color             = "#333333"
    gap_size                = 4
    separator_color         = frame
    sort                    = yes

    font                    = monospace 10
    line_height             = 1
    markup                  = no
    format                  = "%s\n%b"
    alignment               = left
    vertical_alignment      = center
    show_age_threshold      = -1
    ellipsize               = middle
    ignore_newline          = no
    stack_duplicates        = true
    hide_duplicate_count    = true
    show_indicators         = no

    icon_position           = off

    sticky_history          = yes
    history_length          = 10
    corner_radius           = 2
    mouse_left_click        = close_current
    mouse_middle_click      = do_action, close_current
    mouse_right_click       = close_all

[experimental]
    per_monitor_dpi         = false

# ── Urgency: Low ───────────────────────────────────────────────
[urgency_low]
    background              = "#0a0a0a"
    foreground              = "#555555"
    frame_color             = "#333333"
    timeout                 = 3

# ── Urgency: Normal ────────────────────────────────────────────
[urgency_normal]
    background              = "#0a0a0a"
    foreground              = "#e8e8e8"
    frame_color             = "#333333"
    timeout                 = 3

# ── Urgency: Critical ──────────────────────────────────────────
[urgency_critical]
    background              = "#0a0a0a"
    foreground              = "#888888"
    frame_color             = "#888888"
    timeout                 = 0
