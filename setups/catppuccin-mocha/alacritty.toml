# ── catppuccin-mocha Alacritty config ──────────────────────────

[window]
padding    = { x = 16, y = 12 }
decorations = "buttonless"
opacity    = 0.96
blur       = true
title      = "Terminal"
dynamic_title = true

[font]
normal  = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold    = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic  = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size    = 13.0

[cursor]
style    = { shape = "Beam", blinking = "On" }
blink_interval = 500

[scrolling]
history   = 10000
multiplier = 3

[selection]
save_to_clipboard = true

# ── Catppuccin Mocha colors ─────────────────────────────────────
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#a6adc8"
bright_foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text   = "#1e1e2e"
cursor = "#cba6f7"

[colors.selection]
text       = "#1e1e2e"
background = "#313244"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#a6adc8"
