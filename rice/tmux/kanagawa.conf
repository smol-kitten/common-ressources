# Theme: Kanagawa
# Source: https://github.com/rebelot/kanagawa.nvim
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/kanagawa.conf

# Status bar
set -g status-style "bg=#1f1f28,fg=#dcd7ba"
set -g status-left-style "fg=#76946a,bold"
set -g status-right-style "fg=#727169"

# Active window tab
set -g window-status-current-style "fg=#1f1f28,bg=#7e9cd8,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#727169,bg=#1f1f28"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#727169"
set -g pane-active-border-style "fg=#7e9cd8"

# Message bar
set -g message-style "bg=#c0a36e,fg=#1f1f28"

# Selection in copy mode
set -g mode-style "bg=#2d4f67,fg=#dcd7ba"

# Clock
set -g clock-mode-colour "#7e9cd8"
