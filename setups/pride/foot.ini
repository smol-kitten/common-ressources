# ── pride Foot terminal config ─────────────────────────────────
# Install: ~/.config/foot/foot.ini

[main]
font=JetBrainsMono Nerd Font:size=11
pad=10x6
dpi-aware=yes
term=foot

[colors]
background=0d0221
foreground=ffffff
selection-background=4a2080
selection-foreground=ffffff

regular0=2a1052
regular1=ff4d4d
regular2=57e389
regular3=ffdd57
regular4=55cdfc
regular5=f7a8b8
regular6=4db6e8
regular7=d4b8e0
bright0=4a2080
bright1=ff6b6b
bright2=6ef7a0
bright3=ffe57d
bright4=7ddeff
bright5=ffc0cb
bright6=70ccf0
bright7=ffffff

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000
