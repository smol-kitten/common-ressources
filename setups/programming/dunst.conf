# ── programming Dunst — Tokyo Night ───────────────────────────

[global]
    monitor                 = 0
    follow                  = keyboard

    # Geometry — top-right
    width                   = 360
    height                  = 130
    origin                  = top-right
    offset                  = 12x42
    scale                   = 0

    notification_limit      = 8
    progress_bar            = true
    progress_bar_height     = 6
    progress_bar_frame_width = 1
    progress_bar_min_width  = 150
    progress_bar_max_width  = 300
    progress_bar_corner_radius = 4

    indicate_hidden         = yes
    transparency            = 8
    separator_height        = 1
    padding                 = 10
    horizontal_padding      = 12
    text_icon_padding       = 8
    frame_width             = 1
    frame_color             = "#3b4261"
    gap_size                = 4
    separator_color         = frame
    sort                    = yes

    font                    = JetBrainsMono Nerd Font 11
    line_height             = 2
    markup                  = full
    format                  = "<b>%s</b>\n%b"
    alignment               = left
    vertical_alignment      = center
    show_age_threshold      = 30
    ellipsize               = middle
    ignore_newline          = no
    stack_duplicates        = true
    hide_duplicate_count    = false
    show_indicators         = yes

    enable_recursive_icon_lookup = true
    icon_theme              = Papirus-Dark
    icon_position           = left
    min_icon_size           = 24
    max_icon_size           = 40

    sticky_history          = yes
    history_length          = 30
    browser                 = /usr/bin/xdg-open
    always_run_script       = true
    title                   = Dunst
    class                   = Dunst
    corner_radius           = 8
    force_xwayland          = false
    verbosity               = mesg
    mouse_left_click        = close_current
    mouse_middle_click      = do_action, close_current
    mouse_right_click       = close_all

[urgency_low]
    background              = "#1a1b26"
    foreground              = "#565f89"
    frame_color             = "#292e42"
    timeout                 = 4

[urgency_normal]
    background              = "#24283b"
    foreground              = "#c0caf5"
    frame_color             = "#3b4261"
    timeout                 = 7

[urgency_critical]
    background              = "#1a1b26"
    foreground              = "#f7768e"
    frame_color             = "#f7768e"
    timeout                 = 0
    default_icon            = dialog-error

# ── Per-app rules ──────────────────────────────────────────────
[build-success]
    appname                 = "Build"
    summary                 = "*success*"
    foreground              = "#9ece6a"
    frame_color             = "#9ece6a"
    timeout                 = 5

[build-failure]
    appname                 = "Build"
    summary                 = "*fail*"
    urgency                 = critical
