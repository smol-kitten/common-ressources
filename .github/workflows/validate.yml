# Validation workflow for static resources

name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Check for broken links in README
        run: |
          if [ -f README.md ]; then
            echo "README.md found"
            cat README.md
          fi
        shell: bash

      - name: Validate all JSON files (syntax)
        run: |
          echo "Checking JSON syntax for all .json files..."
          ERRORS=0
          while IFS= read -r -d '' f; do
            if python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "  OK  $f"
            else
              echo " FAIL $f — invalid JSON"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name "*.json" ! -path "./.git/*" -print0 | sort -z)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS JSON file(s) failed syntax validation"
            exit 1
          fi
          echo "All JSON files are valid."
        shell: bash

      - name: Run schema checks
        run: |
          bash validate.sh
        shell: bash

      - name: List all resource files
        run: |
          echo "=== Preview images ==="
          find . -name "*.png" ! -path "./.git/*" | sort
          echo "=== HTML templates ==="
          find . -name "preview.html" ! -path "./.git/*" | sort
          echo "=== JSON resources ==="
          find . -name "*.json" ! -path "./.git/*" | sort
          echo "=== Totals ==="
          echo "JSON files:  $(find . -name '*.json' ! -path './.git/*' | wc -l)"
          echo "PNG files:   $(find . -name '*.png'  ! -path './.git/*' | wc -l)"
          echo "HTML files:  $(find . -name '*.html' ! -path './.git/*' | wc -l)"
        shell: bash
