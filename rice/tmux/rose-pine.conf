# Theme: Rose Piné
# Source: https://rosepinetheme.com
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/rose-pine.conf

# Status bar
set -g status-style "bg=#191724,fg=#e0def4"
set -g status-left-style "fg=#31748f,bold"
set -g status-right-style "fg=#6e6a86"

# Active window tab
set -g window-status-current-style "fg=#191724,bg=#9ccfd8,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#6e6a86,bg=#191724"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#6e6a86"
set -g pane-active-border-style "fg=#9ccfd8"

# Message bar
set -g message-style "bg=#f6c177,fg=#191724"

# Selection in copy mode
set -g mode-style "bg=#403d52,fg=#e0def4"

# Clock
set -g clock-mode-colour "#9ccfd8"
