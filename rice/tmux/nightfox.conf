# Theme: Nightfox
# Source: https://github.com/EdenEast/nightfox.nvim
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/nightfox.conf

# Status bar
set -g status-style "bg=#192330,fg=#CDCECF"
set -g status-left-style "fg=#81B29A,bold"
set -g status-right-style "fg=#575860"

# Active window tab
set -g window-status-current-style "fg=#192330,bg=#719CD6,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#575860,bg=#192330"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#575860"
set -g pane-active-border-style "fg=#719CD6"

# Message bar
set -g message-style "bg=#DBC074,fg=#192330"

# Selection in copy mode
set -g mode-style "bg=#2B3B51,fg=#CDCECF"

# Clock
set -g clock-mode-colour "#719CD6"
