<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Platforms</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f12;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 28px;
    color: #ccc;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .card {
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .card-top {
    padding: 18px 16px 14px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .platform-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .platform-hex {
    font-size: 11px;
    font-family: 'JetBrains Mono', Menlo, monospace;
    opacity: 0.65;
    margin-top: 4px;
  }
  .card-bottom {
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 4px;
    border-top: 1px solid rgba(0,0,0,0.2);
    min-height: 34px;
  }
  .category {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }
  .badges { display: flex; gap: 5px; align-items: center; }
  .badge {
    font-size: 8px;
    padding: 2px 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    letter-spacing: 0.05em;
  }
  .badge-oss { background: rgba(50,200,100,0.25); }
  .badge-fed { background: rgba(100,150,255,0.25); }
  .char-limit {
    font-size: 9px;
    font-family: monospace;
    opacity: 0.55;
  }
  .founded {
    font-size: 9px;
    opacity: 0.45;
  }
</style>
</head>
<body>
<h1>Social Platform Brand Colors — common-ressources</h1>
<div class="grid" id="grid"></div>

<script>
const PLATFORMS = "__PLATFORMS__";

function textOn(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 130 ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.92)';
}

function card(p) {
  const bg = p['brand-color'];
  const fg = textOn(bg);
  const badges = [];
  if (p['open-source']) badges.push('<span class="badge badge-oss">OSS</span>');
  if (p.federated) badges.push(`<span class="badge badge-fed">${p.protocol || 'federated'}</span>`);

  return `<div class="card">
    <div class="card-top" style="background:${bg}">
      <div>
        <div class="platform-name" style="color:${fg}">${p.name}</div>
        <div class="platform-hex" style="color:${fg}">${bg.toUpperCase()}</div>
      </div>
      <div class="founded" style="color:${fg}">est. ${p.founded}</div>
    </div>
    <div class="card-bottom">
      <span class="category">${p.category}</span>
      <div class="badges">${badges.join('')}</div>
      ${p['character-limit'] ? `<span class="char-limit">${p['character-limit'].toLocaleString()} chars</span>` : ''}
    </div>
  </div>`;
}

document.getElementById('grid').innerHTML = PLATFORMS.map(card).join('');
</script>
</body>
</html>
