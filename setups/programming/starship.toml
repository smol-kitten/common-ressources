# ── Starship config — Tokyo Night ─────────────────────────────

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$nodejs\
$python\
$rust\
$golang\
$java\
$cmd_duration\
$time\
$line_break\
$character"""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol   = "[❯](bold #f7768e)"
vimcmd_symbol  = "[❮](bold #7aa2f7)"

[directory]
style            = "bold #7aa2f7"
truncation_length = 4
truncate_to_repo  = true
read_only        = " 󰌾"
format           = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style  = "#bb9af7"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style     = "#e0af68"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified  = "!${count}"
staged    = "+${count}"
deleted   = "✘${count}"
format    = "([$all_status$ahead_behind]($style) )"

[git_state]
style  = "#f7768e"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
min_time = 2000
style    = "#737aa2"
format   = "[ $duration]($style) "

[time]
disabled = false
style    = "#565f89"
format   = "[$time]($style)"
time_format = "%H:%M"

[nodejs]
symbol = " "
style  = "#9ece6a"
format = "[$symbol$version]($style) "

[python]
symbol = " "
style  = "#7aa2f7"
format = '[$symbol$pyenv_prefix($version )(\($virtualenv\))]($style) '

[rust]
symbol = " "
style  = "#f7768e"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style  = "#7dcfff"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style  = "#e0af68"
format = "[$symbol$version]($style) "

[username]
show_always = false
style_user  = "#c0caf5"
format      = "[$user]($style)@"

[hostname]
ssh_only = true
style    = "#a9b1d6"
format   = "[$hostname]($style) "
