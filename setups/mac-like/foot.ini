# ── mac-like Foot terminal config ─────────────────────────────
# Install: ~/.config/foot/foot.ini

[main]
font=JetBrainsMono Nerd Font:size=11
pad=10x6
dpi-aware=yes
term=foot

[colors]
background=eff1f5
foreground=4c4f69
selection-background=bcc0cc
selection-foreground=4c4f69

regular0=5c5f77
regular1=d20f39
regular2=40a02b
regular3=df8e1d
regular4=1e66f5
regular5=ea76cb
regular6=179299
regular7=acb0be
bright0=6c6f85
bright1=d20f39
bright2=40a02b
bright3=df8e1d
bright4=1e66f5
bright5=8839ef
bright6=04a5e5
bright7=bcc0cc

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000
