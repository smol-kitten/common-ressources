# Theme: Catppuccin Latte
# Source: https://catppuccin.com
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/catppuccin-latte.conf

# Status bar
set -g status-style "bg=#eff1f5,fg=#4c4f69"
set -g status-left-style "fg=#40a02b,bold"
set -g status-right-style "fg=#6c6f85"

# Active window tab
set -g window-status-current-style "fg=#eff1f5,bg=#1e66f5,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#6c6f85,bg=#eff1f5"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#6c6f85"
set -g pane-active-border-style "fg=#1e66f5"

# Message bar
set -g message-style "bg=#df8e1d,fg=#eff1f5"

# Selection in copy mode
set -g mode-style "bg=#acb0be,fg=#4c4f69"

# Clock
set -g clock-mode-colour "#1e66f5"
