# Theme: Palenight
# Source: https://github.com/whizkydee/vscode-palenight-theme
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/palenight.conf

# Status bar
set -g status-style "bg=#292d3e,fg=#a6accd"
set -g status-left-style "fg=#c3e88d,bold"
set -g status-right-style "fg=#434758"

# Active window tab
set -g window-status-current-style "fg=#292d3e,bg=#82aaff,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#434758,bg=#292d3e"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#434758"
set -g pane-active-border-style "fg=#82aaff"

# Message bar
set -g message-style "bg=#ffcb6b,fg=#292d3e"

# Selection in copy mode
set -g mode-style "bg=#32374d,fg=#a6accd"

# Clock
set -g clock-mode-colour "#82aaff"
