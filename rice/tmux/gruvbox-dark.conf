# Theme: Gruvbox Dark
# Source: https://github.com/morhetz/gruvbox
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/gruvbox-dark.conf

# Status bar
set -g status-style "bg=#282828,fg=#EBDBB2"
set -g status-left-style "fg=#98971A,bold"
set -g status-right-style "fg=#928374"

# Active window tab
set -g window-status-current-style "fg=#282828,bg=#458588,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#928374,bg=#282828"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#928374"
set -g pane-active-border-style "fg=#458588"

# Message bar
set -g message-style "bg=#D79921,fg=#282828"

# Selection in copy mode
set -g mode-style "bg=#3C3836,fg=#EBDBB2"

# Clock
set -g clock-mode-colour "#458588"
