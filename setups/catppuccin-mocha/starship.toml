# ── Starship prompt — Catppuccin Mocha ─────────────────────────
# Install: curl -sS https://starship.rs/install.sh | sh
# Apply: cp starship.toml ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](mauve)\
$os\
$username\
[](bg:blue fg:mauve)\
$directory\
[](fg:blue bg:teal)\
$git_branch\
$git_status\
[](fg:teal bg:surface0)\
$cmd_duration\
[](fg:surface0 bg:surface1)\
$time\
[ ](fg:surface1)\
$line_break$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[os]
disabled = false
style = "bg:mauve fg:crust"

[os.symbols]
Arch   = ""
Debian = ""
Ubuntu = ""
Fedora = ""
NixOS  = ""
Windows = ""
Macos  = ""
Linux  = ""

[username]
show_always = true
style_user  = "bg:mauve fg:crust"
style_root  = "bg:red fg:crust"
format      = '[ $user ]($style)'

[directory]
style    = "fg:crust bg:blue"
format   = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style  = "bg:teal fg:crust"
format = '[[ $symbol $branch ](fg:crust bg:teal)]($style)'

[git_status]
style  = "bg:teal fg:crust"
format = '[[($all_status$ahead_behind )](fg:crust bg:teal)]($style)'

[cmd_duration]
min_time   = 500
style      = "fg:peach bg:surface0"
format     = "[  $duration ]($style)"

[time]
disabled    = false
time_format = "%H:%M"
style       = "fg:text bg:surface1"
format      = "[  $time ]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
