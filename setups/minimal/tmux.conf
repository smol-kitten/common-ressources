# ── minimal tmux config — monochrome ───────────────────────────
# Install: ~/.config/tmux/tmux.conf  (or ~/.tmux.conf)

# ── Prefix: Ctrl+a ─────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits ─────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim keys) ─────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# ── Status bar — monochrome ────────────────────────────────────
set -g status on
set -g status-interval 30
set -g status-position top
set -g status-style "bg=#1a1a1a,fg=#888888"

set -g status-left "#[fg=#e8e8e8] #S "
set -g status-left-length 20

set -g status-right "#[fg=#888888] %H:%M "
set -g status-right-length 15

setw -g window-status-format         "#[fg=#555555] #I:#W "
setw -g window-status-current-format "#[fg=#e8e8e8] #I:#W "
setw -g window-status-current-style  "fg=#e8e8e8"

set -g pane-border-style        "fg=#333333"
set -g pane-active-border-style "fg=#888888"

# ── Copy mode ──────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
