# ── gaming Alacritty config — Gruvbox Dark ─────────────────────

[window]
padding    = { x = 12, y = 8 }
decorations = "none"
opacity    = 1.0
blur       = false
title      = "Terminal"
dynamic_title = true

[font]
normal  = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold    = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic  = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size    = 12.0

[cursor]
style    = { shape = "Block", blinking = "Off" }

[scrolling]
history   = 10000
multiplier = 3

[selection]
save_to_clipboard = true

# ── Gruvbox Dark colors ─────────────────────────────────────────
[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.cursor]
text   = "#282828"
cursor = "#fe8019"

[colors.vi_mode_cursor]
text   = "#282828"
cursor = "#d79921"

[colors.selection]
text       = "#282828"
background = "#fe8019"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"
