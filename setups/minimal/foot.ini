# ── minimal Foot terminal config — monochrome ──────────────────
# Install: ~/.config/foot/foot.ini

[main]
font=JetBrainsMono Nerd Font:size=11
pad=8x6
dpi-aware=yes
term=foot

[colors]
background=0a0a0a
foreground=e8e8e8
selection-background=333333
selection-foreground=e8e8e8

regular0=1a1a1a
regular1=cc3333
regular2=669966
regular3=b8a020
regular4=4466aa
regular5=886688
regular6=4488aa
regular7=888888
bright0=444444
bright1=dd4444
bright2=77aa77
bright3=ccaa33
bright4=5577bb
bright5=9977aa
bright6=55aacc
bright7=e8e8e8

[cursor]
style=block
blink=no
color=e8e8e8 0a0a0a

[scrollback]
lines=10000
