# Theme: One Dark
# Source: https://github.com/atom/atom
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/one-dark.conf

# Status bar
set -g status-style "bg=#282C34,fg=#ABB2BF"
set -g status-left-style "fg=#98C379,bold"
set -g status-right-style "fg=#5C6370"

# Active window tab
set -g window-status-current-style "fg=#282C34,bg=#61AFEF,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#5C6370,bg=#282C34"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#5C6370"
set -g pane-active-border-style "fg=#61AFEF"

# Message bar
set -g message-style "bg=#E5C07B,fg=#282C34"

# Selection in copy mode
set -g mode-style "bg=#3E4451,fg=#ABB2BF"

# Clock
set -g clock-mode-colour "#61AFEF"
