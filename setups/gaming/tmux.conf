# ── gaming tmux config — Gruvbox Dark ──────────────────────────
# Install: ~/.config/tmux/tmux.conf  (or ~/.tmux.conf)

# ── Prefix: Ctrl+a ─────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Splits ─────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim keys) ─────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar — Gruvbox Dark ──────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#3c3836,fg=#a89984"

set -g status-left "#[fg=#fe8019,bold] #S #[default]"
set -g status-left-length 20

set -g status-right "#[fg=#a89984] %H:%M "
set -g status-right-length 20

setw -g window-status-format         "#[fg=#665c54] #I:#W "
setw -g window-status-current-format "#[fg=#fe8019,bold] #I:#W "
setw -g window-status-current-style  "fg=#fe8019,bold"

set -g pane-border-style        "fg=#504945"
set -g pane-active-border-style "fg=#fe8019"

# ── Copy mode ──────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
