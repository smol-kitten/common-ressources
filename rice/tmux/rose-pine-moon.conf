# Theme: Rosé Pine Moon
# Source: https://rosepinetheme.com
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/rose-pine-moon.conf

# Status bar
set -g status-style "bg=#232136,fg=#E0DEF4"
set -g status-left-style "fg=#3E8FB0,bold"
set -g status-right-style "fg=#6E6A86"

# Active window tab
set -g window-status-current-style "fg=#232136,bg=#9CCFD8,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#6E6A86,bg=#232136"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#6E6A86"
set -g pane-active-border-style "fg=#9CCFD8"

# Message bar
set -g message-style "bg=#F6C177,fg=#232136"

# Selection in copy mode
set -g mode-style "bg=#44415A,fg=#E0DEF4"

# Clock
set -g clock-mode-colour "#9CCFD8"
