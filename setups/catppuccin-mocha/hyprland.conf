# ──────────────────────────────────────────────────────────────
# Hyprland config — catppuccin-mocha setup
# ──────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/wallpaper.jpg --transition-type fade
exec-once = wl-paste --watch cliphist store

$terminal   = alacritty
$launcher   = rofi -show drun -show-icons
$filemanager = thunar
$browser    = firefox

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity = -0.3
    touchpad {
        natural_scroll    = true
        disable_while_typing = true
        tap-to-click      = true
        drag_lock         = true
    }
}

# ── General ────────────────────────────────────────────────────
general {
    gaps_in              = 5
    gaps_out             = 10
    border_size          = 2
    col.active_border    = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border  = rgba(45475aff)
    layout               = dwindle
    resize_on_border     = true
}

# ── Decorations ────────────────────────────────────────────────
decoration {
    rounding = 12

    blur {
        enabled          = true
        size             = 8
        passes           = 3
        new_optimizations = true
        ignore_opacity   = false
        xray             = false
    }

    drop_shadow          = true
    shadow_range         = 20
    shadow_render_power  = 3
    shadow_offset        = 0 4
    col.shadow           = rgba(11111b55)
    col.shadow_inactive  = rgba(11111b33)

    active_opacity       = 1.0
    inactive_opacity     = 0.97
    fullscreen_opacity   = 1.0
}

# ── Animations (Apple bezier, same as mac-like) ────────────────
animations {
    enabled = true

    bezier = appleSmooth,  0.36, 0.07, 0.19, 0.97
    bezier = appleEase,    0.25, 0.46, 0.45, 0.94
    bezier = overshot,     0.05, 0.9,  0.1,  1.08

    animation = windows,     1, 5,  overshot,    slide
    animation = windowsOut,  1, 5,  appleSmooth, popin 80%
    animation = border,      1, 8,  appleEase
    animation = fade,        1, 6,  appleEase
    animation = workspaces,  1, 5,  appleEase,   slidefade 20%
}

# ── Layout ─────────────────────────────────────────────────────
dwindle {
    pseudotile        = true
    preserve_split    = true
    smart_split       = false
}

master {
    new_is_master = true
}

# ── Gestures ───────────────────────────────────────────────────
gestures {
    workspace_swipe        = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert  = true
    workspace_swipe_cancel_ratio = 0.2
}

# ── Misc ───────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = true
    animate_mouse_windowdragging = true
    enable_swallow          = true
    swallow_regex           = ^(alacritty|kitty)$
}

# ── Window rules ───────────────────────────────────────────────
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = float,  title:^(Preferences)$
windowrulev2 = float,  title:^(Open File)$
windowrulev2 = float,  title:^(Save File)$
windowrulev2 = center, floating:1

# ── Keybinds ───────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,     exec, $terminal
bind = $mod, Space,      exec, $launcher
bind = $mod, E,          exec, $filemanager
bind = $mod, B,          exec, $browser
bind = $mod, Q,          killactive
bind = $mod, F,          fullscreen, 1
bind = $mod SHIFT, F,    fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo
bind = $mod, J,          togglesplit
bind = $mod SHIFT, Q,    exit

# Screenshot
bind = $mod SHIFT, 3, exec, grimblast copysave screen
bind = $mod SHIFT, 4, exec, grimblast copysave area

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, h,     movefocus, l
bind = $mod, l,     movefocus, r
bind = $mod, k,     movefocus, u
bind = $mod, j,     movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume / brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
