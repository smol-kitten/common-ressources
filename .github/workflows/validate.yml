# Validation workflow for static resources

name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for broken links in README
        run: |
          if [ -f README.md ]; then
            echo "README.md found"
            cat README.md
          fi
        shell: bash
      
      - name: List all files
        run: |
          echo "Repository contents:"
          find . -type f -name "*.svg" -o -name "*.png" -o -name "*.jpg" | head -100
        shell: bash
