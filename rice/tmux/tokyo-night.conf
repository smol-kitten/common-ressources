# Theme: Tokyo Night
# Source: https://github.com/enkia/tokyo-night-vscode-theme
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/tokyo-night.conf

# Status bar
set -g status-style "bg=#1A1B26,fg=#C0CAF5"
set -g status-left-style "fg=#9ECE6A,bold"
set -g status-right-style "fg=#414868"

# Active window tab
set -g window-status-current-style "fg=#1A1B26,bg=#7AA2F7,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#414868,bg=#1A1B26"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7AA2F7"

# Message bar
set -g message-style "bg=#E0AF68,fg=#1A1B26"

# Selection in copy mode
set -g mode-style "bg=#283457,fg=#C0CAF5"

# Clock
set -g clock-mode-colour "#7AA2F7"
