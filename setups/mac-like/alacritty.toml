# ── mac-like Alacritty config — Catppuccin Latte ──────────────

[window]
padding    = { x = 16, y = 12 }
decorations = "buttonless"
opacity    = 0.96
blur       = true
title      = "Terminal"
dynamic_title = true

[font]
normal  = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold    = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic  = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size    = 13.0

[cursor]
style    = { shape = "Beam", blinking = "On" }
blink_interval = 500

[scrolling]
history   = 10000
multiplier = 3

[selection]
save_to_clipboard = true

# ── Catppuccin Latte colors ─────────────────────────────────────
[colors.primary]
background = "#eff1f5"
foreground = "#4c4f69"
dim_foreground = "#6c6f85"
bright_foreground = "#4c4f69"

[colors.cursor]
text   = "#eff1f5"
cursor = "#1e66f5"

[colors.vi_mode_cursor]
text   = "#eff1f5"
cursor = "#8839ef"

[colors.selection]
text       = "#eff1f5"
background = "#1e66f5"

[colors.search.matches]
foreground = "#eff1f5"
background = "#df8e1d"

[colors.normal]
black   = "#5c5f77"
red     = "#d20f39"
green   = "#40a02b"
yellow  = "#df8e1d"
blue    = "#1e66f5"
magenta = "#ea76cb"
cyan    = "#179299"
white   = "#acb0be"

[colors.bright]
black   = "#6c6f85"
red     = "#d20f39"
green   = "#40a02b"
yellow  = "#df8e1d"
blue    = "#1e66f5"
magenta = "#8839ef"
cyan    = "#04a5e5"
white   = "#bcc0cc"

[keyboard]
bindings = [
    { key = "K", mods = "Command", chars = "\x0c" },
]
