# Theme: Solarized Light
# Source: https://ethanschoonover.com/solarized/
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/solarized-light.conf

# Status bar
set -g status-style "bg=#FDF6E3,fg=#657B83"
set -g status-left-style "fg=#859900,bold"
set -g status-right-style "fg=#002B36"

# Active window tab
set -g window-status-current-style "fg=#FDF6E3,bg=#268BD2,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#002B36,bg=#FDF6E3"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#002B36"
set -g pane-active-border-style "fg=#268BD2"

# Message bar
set -g message-style "bg=#B58900,fg=#FDF6E3"

# Selection in copy mode
set -g mode-style "bg=#EEE8D5,fg=#657B83"

# Clock
set -g clock-mode-colour "#268BD2"
