# Theme: Everforest Dark
# Source: https://github.com/sainnhe/everforest
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/everforest-dark.conf

# Status bar
set -g status-style "bg=#2d353b,fg=#d3c6aa"
set -g status-left-style "fg=#a7c080,bold"
set -g status-right-style "fg=#5c6a72"

# Active window tab
set -g window-status-current-style "fg=#2d353b,bg=#7fbbb3,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#5c6a72,bg=#2d353b"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#5c6a72"
set -g pane-active-border-style "fg=#7fbbb3"

# Message bar
set -g message-style "bg=#dbbc7f,fg=#2d353b"

# Selection in copy mode
set -g mode-style "bg=#475258,fg=#d3c6aa"

# Clock
set -g clock-mode-colour "#7fbbb3"
