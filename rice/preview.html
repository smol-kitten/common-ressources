<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rice Terminal Previews</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f12;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 28px;
    color: #ccc;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .terminal-card {
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .titlebar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 12px;
    background: rgba(255,255,255,0.06);
  }
  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
  }
  .dot-red   { background: #ff5f57; }
  .dot-yel   { background: #ffbd2e; }
  .dot-grn   { background: #28c841; }
  .title-label {
    flex: 1;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.45);
    margin-right: 35px;
  }
  .term-body {
    padding: 14px 16px 16px;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 12px;
  }
  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 4px;
  }
  .prompt-line {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }
  .ps1-user  { font-weight: 700; }
  .ps1-sep   { opacity: 0.4; }
  .ps1-dir   { font-weight: 600; }
  .ps1-git   { opacity: 0.6; font-size: 11px; }
  .ps1-sym   { font-weight: 700; }
  .cmd-line  { opacity: 0.75; margin-bottom: 3px; }
  .out-line  { opacity: 0.5; font-size: 11px; }
</style>
</head>
<body>
<h1>Terminal Themes — common-ressources / rice</h1>
<div class="grid"><!--__CARDS__--></div>
</body>
</html>
