# Theme: Material Dark
# Source: https://material-theme.com
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/material-dark.conf

# Status bar
set -g status-style "bg=#212121,fg=#EEFFFF"
set -g status-left-style "fg=#C3E88D,bold"
set -g status-right-style "fg=#B0BEC5"

# Active window tab
set -g window-status-current-style "fg=#212121,bg=#82AAFF,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#B0BEC5,bg=#212121"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#B0BEC5"
set -g pane-active-border-style "fg=#82AAFF"

# Message bar
set -g message-style "bg=#FFCB6B,fg=#212121"

# Selection in copy mode
set -g mode-style "bg=#546E7A,fg=#EEFFFF"

# Clock
set -g clock-mode-colour "#82AAFF"
