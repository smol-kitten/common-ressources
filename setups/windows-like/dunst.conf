# ── windows-like Dunst — Material Dark + Windows Blue ─────────

[global]
    monitor                 = 0
    follow                  = none

    # Geometry — bottom-right, Windows notification style
    width                   = 360
    height                  = 100
    origin                  = bottom-right
    offset                  = 12x52
    scale                   = 0

    notification_limit      = 5
    progress_bar            = true
    progress_bar_height     = 6
    progress_bar_frame_width = 1
    progress_bar_min_width  = 150
    progress_bar_max_width  = 300
    progress_bar_corner_radius = 0

    indicate_hidden         = yes
    transparency            = 0
    separator_height        = 1
    padding                 = 10
    horizontal_padding      = 12
    text_icon_padding       = 8
    frame_width             = 1
    frame_color             = "#3c3c3c"
    gap_size                = 4
    separator_color         = frame
    sort                    = yes

    font                    = Segoe UI 11
    line_height             = 1
    markup                  = full
    format                  = "<b>%s</b>\n%b"
    alignment               = left
    vertical_alignment      = center
    show_age_threshold      = 60
    ellipsize               = end
    ignore_newline          = no
    stack_duplicates        = true
    hide_duplicate_count    = false
    show_indicators         = yes

    enable_recursive_icon_lookup = true
    icon_theme              = Papirus-Dark
    icon_position           = left
    min_icon_size           = 24
    max_icon_size           = 40

    sticky_history          = yes
    history_length          = 20
    browser                 = /usr/bin/xdg-open
    always_run_script       = true
    title                   = Dunst
    class                   = Dunst
    corner_radius           = 2
    force_xwayland          = false
    verbosity               = mesg
    mouse_left_click        = close_current
    mouse_middle_click      = do_action, close_current
    mouse_right_click       = close_all

[experimental]
    per_monitor_dpi         = false

# ── Urgency: Low ───────────────────────────────────────────────
[urgency_low]
    background              = "#252526"
    foreground              = "#9e9e9e"
    frame_color             = "#3c3c3c"
    timeout                 = 4

# ── Urgency: Normal ────────────────────────────────────────────
[urgency_normal]
    background              = "#2d2d2d"
    foreground              = "#cccccc"
    frame_color             = "#0078d4"
    timeout                 = 7

# ── Urgency: Critical ──────────────────────────────────────────
[urgency_critical]
    background              = "#2d2d2d"
    foreground              = "#ff5252"
    frame_color             = "#ff5252"
    timeout                 = 0
    default_icon            = dialog-error
