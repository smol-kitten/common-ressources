# ──────────────────────────────────────────────────────────────
# Hyprland config — minimal setup (Monochrome Grayscale)
# ──────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/wallpaper.jpg --transition-type fade

$terminal   = alacritty
$launcher   = rofi -show drun
$filemanager = thunar
$browser    = firefox

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll    = true
        disable_while_typing = true
        tap-to-click      = true
    }
}

# ── General ────────────────────────────────────────────────────
general {
    gaps_in              = 3
    gaps_out             = 6
    border_size          = 1
    col.active_border    = rgba(888888ff)
    col.inactive_border  = rgba(333333ff)
    layout               = dwindle
    resize_on_border     = true
}

# ── Decorations ────────────────────────────────────────────────
decoration {
    rounding = 4

    blur {
        enabled = false
    }

    drop_shadow = false

    active_opacity   = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
}

# ── Animations ─────────────────────────────────────────────────
animations {
    enabled = false
}

# ── Layout ─────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
}

master {
    new_is_master = true
}

# ── Gestures ───────────────────────────────────────────────────
gestures {
    workspace_swipe        = true
    workspace_swipe_fingers = 3
}

# ── Misc ───────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = false
    animate_mouse_windowdragging = false
}

# ── Window rules ───────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Preferences)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = center, floating:1

# ── Keybinds ───────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,     exec, $terminal
bind = $mod, Space,      exec, $launcher
bind = $mod, E,          exec, $filemanager
bind = $mod, B,          exec, $browser
bind = $mod, Q,          killactive
bind = $mod, F,          fullscreen, 1
bind = $mod SHIFT, F,    fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo
bind = $mod, J,          togglesplit
bind = $mod SHIFT, Q,    exit

# Screenshot
bind = $mod SHIFT, 3, exec, grimblast copysave screen
bind = $mod SHIFT, 4, exec, grimblast copysave area

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, h,     movefocus, l
bind = $mod, l,     movefocus, r
bind = $mod, k,     movefocus, u
bind = $mod, j,     movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume / brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
