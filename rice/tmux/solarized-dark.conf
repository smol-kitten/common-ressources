# Theme: Solarized Dark
# Source: https://ethanschoonover.com/solarized/
# Usage: add to ~/.tmux.conf or source this file
#   source-file ~/.config/tmux/themes/solarized-dark.conf

# Status bar
set -g status-style "bg=#002B36,fg=#839496"
set -g status-left-style "fg=#859900,bold"
set -g status-right-style "fg=#002B36"

# Active window tab
set -g window-status-current-style "fg=#002B36,bg=#268BD2,bold"
set -g window-status-current-format " #I:#W "

# Inactive window tab
set -g window-status-style "fg=#002B36,bg=#002B36"
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#002B36"
set -g pane-active-border-style "fg=#268BD2"

# Message bar
set -g message-style "bg=#B58900,fg=#002B36"

# Selection in copy mode
set -g mode-style "bg=#073642,fg=#839496"

# Clock
set -g clock-mode-colour "#268BD2"
